<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>TCG Game Prototype</title>\n    <link rel="stylesheet" href="style.css">\n</head>\n<body>\n    <header>\n        <h1>TCG Game Prototype</h1>\n    </header>\n    <main>\n        <section id="deck-builder">\n            <h2>Deck Builder</h2>\n            <form>\n                <!-- Deck building elements go here -->\n                <label for="card-selection">Select Cards:</label>\n                <select id="card-selection" multiple>\n                    <!-- Options will be dynamically populated -->\n                </select>\n                <button type="submit">Build Deck</button>\n            </form>\n        </section>\n        <section id="battlefield">\n            <h2>Battlefield</h2>\n            <div id="player-area">\n                <h3>Your Area</h3>\n                <!-- Player's cards will be displayed here -->\n            </div>\n            <div id="opponent-area">\n                <h3>Opponent's Area</h3>\n                <!-- Opponent's cards will be displayed here -->\n            </div>\n        </section>\n    </main>\n    <footer>\n        <p>&copy; 2026 AmblingAlp</p>\n    </footer>\n</body>\n</html>
